<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>REA — Gestión Contable</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="img/favicon-rea.png" />
    <link rel="apple-touch-icon" href="img/favicon-rea.png" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: { preflight: false },
        theme: {
          extend: {
            colors: {
              accent: { DEFAULT: '#076280', light: '#bbe7ef', hover: '#054a62' }
            },
            fontFamily: {
              ui:   ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace']
            }
          }
        }
      }
    </script>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('rea_theme');
          if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (_) { }
      })();
    </script>
    <script>
      (function () {
        var themeVars = [
          '--bg-base',
          '--accent',
          '--accent-light',
          '--accent-hover',
          '--glass-bg-primary',
          '--glass-bg-secondary',
          '--glass-border',
          '--text-primary',
          '--text-secondary',
          '--text-muted',
          '--border-subtle'
        ];

        function setImportant(el, prop, value) {
          if (el) {
            el.style.setProperty(prop, value, 'important');
          }
        }

        function applyLayout(collapsed) {
          var width = collapsed ? '64px' : '256px';
          if (collapsed) {
            document.body.setAttribute('data-sidebar', 'collapsed');
          } else {
            document.body.removeAttribute('data-sidebar');
          }

          document.documentElement.style.setProperty('--layout-sidebar-width', width);
          document.body.style.setProperty('--layout-sidebar-width', width);
          setImportant(document.querySelector('.topbar'), 'left', width);
          setImportant(document.querySelector('.main-content'), 'margin-left', width);
          setImportant(document.querySelector('.app-footer'), 'margin-left', width);
        }

        function clearInlineThemeState() {
          themeVars.forEach(function (key) {
            document.documentElement.style.removeProperty(key);
            if (document.body) {
              document.body.style.removeProperty(key);
            }
          });

          if (document.body) {
            document.body.style.removeProperty('background-color');
          }

          document.querySelectorAll('.main-content, .app-footer').forEach(function (el) {
            el.style.removeProperty('background-color');
          });

          document.querySelectorAll('.topbar, .rea-sidebar, aside, .card, .glass, .glass-card, .glass-surface, .glass-elevation-1, .glass-elevation-2, .glass-elevation-3, .glass-elevation-4, .modal-container, .toast, .error-banner, .login-card').forEach(function (el) {
            el.style.removeProperty('background');
            el.style.removeProperty('background-color');
            el.style.removeProperty('border-color');
          });
        }

        function applyTheme(mode, persist) {
          var dark = mode === 'dark';
          clearInlineThemeState();

          if (dark) {
            document.documentElement.setAttribute('data-theme', 'dark');
          } else {
            document.documentElement.removeAttribute('data-theme');
          }

          if (dark) {
            document.body.setAttribute('data-theme', 'dark');
          } else {
            document.body.removeAttribute('data-theme');
          }

          document.documentElement.style.colorScheme = dark ? 'dark' : 'light';
          document.body.style.colorScheme = dark ? 'dark' : 'light';
          if (persist) {
            localStorage.setItem('rea_theme', dark ? 'dark' : 'light');
          }
        }

        function resolveThemeMode() {
          var saved = localStorage.getItem('rea_theme');
          if (saved === 'dark' || saved === 'light') {
            return saved;
          }

          if (
            document.documentElement.getAttribute('data-theme') === 'dark' ||
            (document.body && document.body.getAttribute('data-theme') === 'dark') ||
            document.querySelector('.app-layout.theme-dark')
          ) {
            return 'dark';
          }

          return 'light';
        }

        window.reaApplyChrome = function () {
          applyTheme(resolveThemeMode(), false);
          applyLayout(localStorage.getItem('rea_sidebar_collapsed') === 'true');
          window.setTimeout(function () {
            applyTheme(resolveThemeMode(), false);
          }, 220);
        };

        window.reaTheme = {
          apply: function (mode) {
            applyTheme(mode, true);
          }
        };

        window.reaLayout = {
          setSidebarCollapsed: function (collapsed) {
            localStorage.setItem('rea_sidebar_collapsed', collapsed ? 'true' : 'false');
            applyLayout(collapsed);
          }
        };

        document.addEventListener('DOMContentLoaded', window.reaApplyChrome);
        window.addEventListener('load', window.reaApplyChrome);
      })();
    </script>
    <link rel="stylesheet" href="css/app.css?v=20260526.4" />
    <link rel="stylesheet" href="css/glassmorphism.css?v=20260526.4" />
    <link rel="stylesheet" href="css/typography.css?v=20260526.4" />
    <link rel="stylesheet" href="css/animations.css?v=20260526.4" />
    <link rel="stylesheet" href="css/components.css?v=20260526.4" />
    <link rel="stylesheet" href="css/theme-runtime-20260526-5.css" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <div class="app-loading-shell" aria-live="polite" aria-label="Cargando aplicación REA">
            <div class="app-loading-mark">
                <div class="app-loading-logo-frame">
                    <img src="img/logo-rea.png" alt="REA" class="app-loading-logo" />
                </div>
                <svg class="loading-progress" viewBox="0 0 160 160" aria-hidden="true">
                    <circle r="62" cx="80" cy="80" />
                    <circle r="62" cx="80" cy="80" />
                </svg>
            </div>
            <div class="app-loading-copy">
                <div class="app-loading-title">REA</div>
                <div class="loading-progress-text"></div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ha ocurrido un error inesperado.
        <a href="." class="reload">Recargar</a>
        <span class="dismiss">x</span>
    </div>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
